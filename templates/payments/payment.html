{% extends 'base.html' %}

{% block content %}

<div class="payment-container">

```
<div class="payment-card">

    <h2>Payment Summary</h2>

    <p class="payment-total">Total: ₹{{ total }}</p>

    <form action="/orders/checkout/" method="post">
        {% csrf_token %}
        <button class="pay-btn">Pay Now</button>
    </form>

    <p class="secure-note">
        🔒 Secure payment — Secure transaction.
    </p>

</div>
```

</div>

{% endblock %}
