
{% extends 'base.html' %}

{% block content %}

<h2>Shop by Category</h2>

<div class="category-grid">
    {% for category in categories %}
        <div class="category-card">
            <a href="{% url 'products_by_category' category.slug %}">
                {% if category.image %}
                    <img src="{{ category.image.url }}">
                {% endif %}
                <h3>{{ category.name }}</h3>
            </a>
        </div>
    {% endfor %}
</div>

{% endblock %}
