{% extends 'base.html' %}

{% block content %}

<h2>Your Cart</h2>

<div class="cart-container">

{% for item in cart_items %} <div class="cart-item">

```
    <div class="cart-details">
        <h3>{{ item.product.name }}</h3>

        <div class="quantity-controls">
            <a href="{% url 'decrease_quantity' item.id %}">−</a>
            {{ item.quantity }}
            <a href="{% url 'increase_quantity' item.id %}">+</a>
        </div>

        <a href="{% url 'remove_from_cart' item.id %}">Remove</a>
    </div>

    <div class="cart-price">
        ₹{{ item.total_price }}
    </div>

</div>
```

{% empty %} <p>Your cart is empty.</p>
{% endfor %}

<div class="checkout-box">
    <h3>Total: ₹{{ total }}</h3>
    <a href="/payment/">
        <button class="checkout-btn">Proceed to Payment</button>
    </a>
</div>

</div>

{% endblock %}
