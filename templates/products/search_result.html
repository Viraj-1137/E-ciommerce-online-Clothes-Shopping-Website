{% extends 'base.html' %}

{% block content %}

<h2>Search Results for "{{ query }}"</h2>

{% for product in products %} <div> <a href="{% url 'product_detail' product.slug %}"> <h3>{{ product.name }}</h3> </a> <p>Price: ₹{{ product.price }}</p> </div>
{% empty %} <p>No products found.</p>
{% endfor %}

{% endblock %}
